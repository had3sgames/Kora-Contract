name: TTL Keeper

on:
  schedule:
    # Run every 7 days — well within the ~30-day TTL window
    - cron: '0 6 */7 * *'
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        default: 'testnet'
        type: choice
        options:
          - testnet
          - mainnet

jobs:
  bump-ttl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Stellar CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/nicholasgasior/gxs/master/install.sh | bash -s -- stellar stellar-cli
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run TTL Keeper
        env:
          DEPLOYER_SECRET: ${{ secrets.TTL_KEEPER_SECRET }}
        run: |
          chmod +x scripts/ttl_keeper.sh
          ./scripts/ttl_keeper.sh ${{ github.event.inputs.network || 'testnet' }}
